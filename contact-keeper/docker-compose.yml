services:
  postgres:
    image: postgres:15
    container_name: contactkeeper_db
    environment:
      POSTGRES_USER: ${DB_USER:-contactuser}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-SecurePass123}
      POSTGRES_DB: ${DB_NAME:-contactdb}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - contact_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U contactuser -d contactdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: contactkeeper_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@contactkeeper.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-AdminPass123}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "5050:80"
    networks:
      - contact_network
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: contactkeeper_backend
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-contactuser}
      DB_PASSWORD: ${DB_PASSWORD:-SecurePass123}
      DB_NAME: ${DB_NAME:-contactdb}
      SECRET_KEY: ${SECRET_KEY:-supersecretkey123}
    volumes:
      - ./backend:/app
    ports:
      - "5000:5000"
    networks:
      - contact_network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build: ./nginx
    container_name: contactkeeper_nginx
    ports:
      - "80:80"
      - "443:443"
    networks:
      - contact_network
    depends_on:
      - backend
      - pgadmin
    restart: unless-stopped

volumes:
  postgres_data:
  pgadmin_data:

networks:
  contact_network:
    driver: bridge
