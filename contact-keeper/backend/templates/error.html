{% extends "base.html" %}

{% block title %}Ошибка {{ error_code }}{% endblock %}

{% block content %}
<div class="card" style="max-width: 720px; margin: 60px auto; text-align: center;">
    <div style="font-size: 4rem; font-weight: 700; color: var(--primary-color); line-height: 1;">
        {{ error_code }}
    </div>
    <h1 style="margin: 20px 0 10px;">{{ title }}</h1>
    <p style="color: var(--gray-color); margin-bottom: 30px; font-size: 1.05rem;">
        {{ message }}
    </p>
    <div style="display: flex; justify-content: center; gap: 12px; flex-wrap: wrap;">
        <a href="{{ action_url or url_for('index') }}" class="btn btn-primary">
            {{ action_text or 'На главную' }}
        </a>
        <a href="javascript:history.back()" class="btn btn-success">
            Назад
        </a>
    </div>
</div>
{% endblock %}
